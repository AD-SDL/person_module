node_name: default.node
node_id: 01KMDVW3NGNJ0QQX7BQ978DWT1
node_description: null
node_type: device
module_name: person_node
module_version: 0.0.1
capabilities:
  get_info: true
  get_state: true
  get_status: true
  send_action: true
  get_action_status: true
  get_action_result: true
  get_action_history: true
  action_files: true
  send_admin_commands: true
  set_config: true
  get_resources: false
  get_log: true
  admin_commands:
  - lock
  - reset
  - shutdown
  - unlock
node_url: null
actions:
  await_input:
    name: await_input
    description: "\n        A non-blocking action that can be used to keep the node\
      \ alive and responsive while waiting for input. This can be useful in scenarios\
      \ where the node needs to maintain a connection or perform background tasks\
      \ without blocking the main thread.\n        "
    args: {}
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
  release_wait:
    name: release_wait
    description: "\n        A non-blocking action that can be used to stop waiting\
      \ for input. This can be useful in scenarios where the node needs to maintain\
      \ a connection or perform background tasks without blocking the main thread.\n\
      \        "
    args: {}
    locations: {}
    files: {}
    results: {}
    blocking: false
    asynchronous: true
    accepts_var_args: false
    accepts_var_kwargs: false
    var_args_schema: null
    var_kwargs_schema: null
config:
  node_definition: default.node.yaml
  node_info_path: null
  update_node_files: true
  status_update_interval: 2.0
  state_update_interval: 2.0
  node_url: http://127.0.0.1:2000/
  uvicorn_kwargs: {}
config_schema:
  description: Configuration for the person node module.
  properties:
    node_definition:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: default.node.yaml
      description: Path to the node definition file to use. If set, the node will
        load the definition from this file on startup. Otherwise, a default configuration
        will be created.
      title: Node Definition File
    node_info_path:
      anyOf:
      - type: string
      - format: path
        type: string
      - type: 'null'
      default: null
      description: Path to export the generated node info file. If not set, will use
        the node name and the node_definition's path.
      title: Node Info Path
    update_node_files:
      default: true
      description: Whether to update the node definition and info files on startup.
        If set to False, the node will not update the files even if they are out of
        date.
      title: Update Node Files
      type: boolean
    status_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 2.0
      description: The interval in seconds at which the node should update its status.
      title: Status Update Interval
    state_update_interval:
      anyOf:
      - type: number
      - type: 'null'
      default: 2.0
      description: The interval in seconds at which the node should update its state.
      title: State Update Interval
    node_url:
      default: http://127.0.0.1:2000/
      description: The URL used to communicate with the node. This is the base URL
        for the REST API.
      format: uri
      minLength: 1
      title: Node URL
      type: string
    uvicorn_kwargs:
      description: Configuration for the Uvicorn server that runs the REST API.
      title: Uvicorn Configuration
      type: object
  title: PersonNodeConfig
  type: object
